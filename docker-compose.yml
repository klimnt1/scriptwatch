services:
  api:
    image: ghcr.io/klimnt1/scriptwatch:latest
    container_name: scriptwatch
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATA_DIR: /app/data
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/scriptwatch.db}
      SCRIPT_STORE_DIR: ${SCRIPT_STORE_DIR:-/app/data/script-store}
      AGENT_TOKEN: ${AGENT_TOKEN}
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      NTFY_URL: ${NTFY_URL:-}
      NTFY_TOKEN: ${NTFY_TOKEN:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      BASE_URL: ${BASE_URL:-}
      MISSED_RUN_GRACE_MINUTES: ${MISSED_RUN_GRACE_MINUTES:-15}
      JOB_RETENTION_DAYS: ${JOB_RETENTION_DAYS:-30}
      DAILY_DIGEST_ENABLED: ${DAILY_DIGEST_ENABLED:-false}
      DAILY_DIGEST_HOUR: ${DAILY_DIGEST_HOUR:-8}
      DAILY_DIGEST_MINUTE: ${DAILY_DIGEST_MINUTE:-0}
      DAILY_DIGEST_TIMEZONE: ${DAILY_DIGEST_TIMEZONE:-America/New_York}
      DAILY_DIGEST_LOOKBACK_HOURS: ${DAILY_DIGEST_LOOKBACK_HOURS:-24}
      DAILY_DIGEST_INCLUDE_FAILURES: ${DAILY_DIGEST_INCLUDE_FAILURES:-true}
      DAILY_DIGEST_INCLUDE_ANOMALIES: ${DAILY_DIGEST_INCLUDE_ANOMALIES:-true}
      DAILY_DIGEST_INCLUDE_SCRIPTS: ${DAILY_DIGEST_INCLUDE_SCRIPTS:-true}
    volumes:
      - ./data:/app/data
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; json.load(urllib.request.urlopen('http://127.0.0.1:8080/api/health', timeout=5))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
