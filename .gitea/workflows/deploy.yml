name: Build and Push

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'agent/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'wsgi.py'
      - 'gunicorn.conf.py'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Gitea registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login gitea.plexusprime.net -u adrianoropesa --password-stdin

      - name: Build and push API
        run: |
          docker build -t gitea.plexusprime.net/adrianoropesa/${{ github.event.repository.name }}:latest .
          docker push gitea.plexusprime.net/adrianoropesa/${{ github.event.repository.name }}:latest

      - name: Build and push Agent
        run: |
          docker build -t gitea.plexusprime.net/adrianoropesa/${{ github.event.repository.name }}-agent:latest ./agent
          docker push gitea.plexusprime.net/adrianoropesa/${{ github.event.repository.name }}-agent:latest

      - name: Cleanup
        if: always()
        run: docker system prune -f

      - name: Notify Discord (success)
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content": "✅ **${{ github.event.repository.name }}** built and pushed successfully."}' \
          ${{ secrets.DISCORD_WEBHOOK }}

      - name: Notify Discord (failure)
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content": "❌ **${{ github.event.repository.name }}** build failed. Check Actions for details."}' \
          ${{ secrets.DISCORD_WEBHOOK }}