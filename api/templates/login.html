{% extends "base.html" %}
{% block title %}Login - ScriptWatch{% endblock %}
{% block body_class %}sw-auth-page{% endblock %}
{% block content %}
<div class="sw-auth-shell">
  <div class="sw-auth-panel">
    <div class="d-flex align-items-center gap-2 mb-3">
      <span class="sw-auth-mark"><i class="bi bi-terminal-fill"></i></span>
      <div>
        <h1 class="h5 mb-0">ScriptWatch</h1>
        <div class="text-secondary small">Admin login</div>
      </div>
    </div>
    <form method="post" action="/login" class="d-grid gap-3">
      <input type="hidden" name="next" value="{{ next_url }}">
      <div>
        <label class="form-label small text-secondary" for="username">Username</label>
        <input class="form-control" id="username" name="username" autocomplete="username" autofocus required>
      </div>
      <div>
        <label class="form-label small text-secondary" for="password">Password</label>
        <input class="form-control" id="password" type="password" name="password" autocomplete="current-password" required>
      </div>
      <div>
        <label class="form-label small text-secondary" for="otp">Authenticator code</label>
        <input class="form-control" id="otp" name="otp" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="{{ 'Required' if mfa_required else 'If MFA is enabled' }}">
      </div>
      <button class="btn btn-success w-100" type="submit">
        <i class="bi bi-box-arrow-in-right me-1"></i>Login
      </button>
    </form>
  </div>
</div>
{% endblock %}
